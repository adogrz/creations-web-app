name: CI Quality Check

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  verification:
    name: Verificar Calidad
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: creations_test
        options: >-
          --health-cmd "pg_isready -U postgres -d creations_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Check de Formato (Prettier)
      - name: Check Formatting
        run: pnpm format:check

      # Check de Linting (ESLint)
      - name: Check Linting
        run: pnpm lint

      # Check de Tipos (TypeScript)
      - name: Check Types
        run: pnpm typecheck

      - name: Check critical contracts and proxy safety
        run: pnpm check:critical

      - name: Check Docker runtime image
        run: pnpm check:docker

      - name: Apply migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/creations_test'

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Check catalog database integration
        run: pnpm check:integration
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/creations_test'

      # Check de Build (Next.js Build)
      - name: Verify Build
        run: pnpm build
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/creations_test'
          SESSION_SECRET: 'dummy-session-secret-at-least-32-chars-long'
          ADMIN_PASSWORD: 'dummy-admin-password'
          R2_ACCESS_KEY_ID: 'dummy-key-id'
          R2_SECRET_ACCESS_KEY: 'dummy-secret-key'
          CLOUDFLARE_ACCOUNT_ID: 'dummy-account-id'
          R2_BUCKET_NAME: 'dummy-bucket-name'
          R2_PUBLIC_URL: 'https://example.com'
